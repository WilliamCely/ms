spring:
  application:
    name: report-ms
  profiles:
    default: default
  config:
    import: "optional:configserver:http://localhost:7777"
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKER:localhost:9092}
      bindings:
        consumerReport-out-0:
          destination: consumerReport

server:
  servlet:
    context-path: /report-ms
  port: 7071
eureka:
  instance:
    instance-id: "${spring.application.name}:${server.port}:${random.value}"
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

fallback:
  uri: ${FALLBACK_URI:http://companies-crud/companies-crud/company/{name}}

